<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 340" role="img" aria-label="Codex Science">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a1020"/>
      <stop offset="0.55" stop-color="#0d2233"/>
      <stop offset="1" stop-color="#0c3b3f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38e8c8"/>
      <stop offset="1" stop-color="#5aa9ff"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#38e8c8" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#38e8c8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="340" rx="20" fill="url(#bg)"/>
  <circle cx="1030" cy="170" r="230" fill="url(#glow)"/>

  <!-- molecular / hexagon motif -->
  <g stroke="url(#accent)" stroke-width="2.5" fill="none" opacity="0.9" transform="translate(980,170)">
    <polygon points="0,-70 61,-35 61,35 0,70 -61,35 -61,-35"/>
    <line x1="0" y1="-70" x2="0" y2="-130"/>
    <line x1="61" y1="35" x2="118" y2="68"/>
    <line x1="-61" y1="35" x2="-118" y2="68"/>
    <g fill="url(#accent)" stroke="none">
      <circle cx="0" cy="-70" r="9"/>
      <circle cx="61" cy="-35" r="9"/>
      <circle cx="61" cy="35" r="9"/>
      <circle cx="0" cy="70" r="9"/>
      <circle cx="-61" cy="35" r="9"/>
      <circle cx="-61" cy="-35" r="9"/>
      <circle cx="0" cy="-130" r="7"/>
      <circle cx="118" cy="68" r="7"/>
      <circle cx="-118" cy="68" r="7"/>
    </g>
  </g>

  <!-- orbit accent -->
  <g transform="translate(88,108)" fill="none" opacity="0.55">
    <ellipse cx="0" cy="0" rx="46" ry="17" stroke="#5aa9ff" stroke-width="2" transform="rotate(30)"/>
    <ellipse cx="0" cy="0" rx="46" ry="17" stroke="#38e8c8" stroke-width="2" transform="rotate(-30)"/>
    <circle cx="0" cy="0" r="5" fill="#e8f6ff"/>
  </g>

  <!-- wordmark -->
  <text x="150" y="150" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="82" font-weight="700" fill="#f2f7fb" letter-spacing="1">
    Codex <tspan fill="url(#accent)">Science</tspan>
  </text>
  <text x="152" y="205" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="27" font-weight="400" fill="#9fb4c6" letter-spacing="0.5">
    Audited scientific research workflows for Codex
  </text>
  <text x="152" y="248" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="400" fill="#5f7688" letter-spacing="0.5">
    Task-scoped &#183; reproducible artifacts &#183; evidence review
  </text>
</svg>
