name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: ${{ matrix.python-version }}
      - name: Compile Python sources
        run: ./scripts/check.sh compile
      - name: Run native skill quality tests
        run: uv run python tests/test_native_skill_quality.py
      - name: Run full unit test suite
        run: ./scripts/check.sh tests
      - name: Verify inventory determinism
        run: ./scripts/check.sh inventory
      - name: Verify generated wrappers
        run: ./scripts/check.sh wrappers
      - name: Validate plugin and skills when validators are available
        run: ./scripts/check.sh skills
