name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref }}
          submodules: recursive
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.11"
      - name: Refresh README counts
        run: |
          python - <<'PY'
          from pathlib import Path

          replacements = {
              "README.md": {
                  "279 agent skills": "280 agent skills",
                  "279 catalog wrappers": "280 catalog wrappers",
                  "Codex-native authored — 127": "Codex-native authored — 128",
                  "25 agentic life-science source and synthesis workflows, six spectroscopy": "25 agentic life-science source and synthesis workflows, a protocol-driven literature-review conductor, six spectroscopy",
              },
              "README.ko.md": {
                  "279개 감사된 에이전트 스킬": "280개 감사된 에이전트 스킬",
                  "279개 카탈로그 wrapper": "280개 카탈로그 wrapper",
                  "Codex-native 저작 — 127": "Codex-native 저작 — 128",
                  "에이전틱 생명과학 source·synthesis workflow 25개, 분광": "에이전틱 생명과학 source·synthesis workflow 25개, protocol 기반 literature-review conductor, 분광",
              },
          }
          for filename, mapping in replacements.items():
              path = Path(filename)
              text = path.read_text(encoding="utf-8")
              for old, new in mapping.items():
                  if old in text:
                      text = text.replace(old, new)
                  elif new not in text:
                      raise SystemExit(f"missing README marker: {filename}: {old}")
              path.write_text(text, encoding="utf-8")
          PY
      - name: Complete sidecar documentation contracts
        run: |
          python - <<'PY'
          from pathlib import Path

          standard_path = Path("docs/NATIVE_SKILL_STANDARD.md")
          standard = standard_path.read_text(encoding="utf-8")
          heading = "## Repository sidecar vocabulary"
          if heading not in standard:
              marker = "## Retrieval requirements"
              section = "\n".join(
                  [
                      heading,
                      "",
                      "Keep manifest schema version 1 stable and attach richer scientific semantics as hashed artifacts. Use `claim-register`, `evidence-graph`, `query-ledger`, `study-table`, `lane-receipt`, `literature-snapshot`, and `model-receipt` kinds when their contracts apply.",
                      "",
                      "Sidecars must use stable IDs, explicit support, contradiction, duplication, dependency, shared-cohort or sample, source-propagation, and training-overlap relationships. A sidecar is authoritative only when its path and SHA-256 are recorded in the manifest and the complete bundle passes `scripts/validate_artifact.py`.",
                      "",
                      "Review or acceptance receipts are invalidated when a covered claim, source snapshot, query, code revision, model contract, weight, database, configuration, input, or artifact hash changes.",
                      "",
                  ]
              )
              if marker not in standard:
                  raise SystemExit("missing native skill standard insertion marker")
              standard = standard.replace(marker, section + "\n" + marker, 1)
              standard_path.write_text(standard, encoding="utf-8")

          provenance_path = Path("skills/science-provenance/SKILL.md")
          provenance = provenance_path.read_text(encoding="utf-8")
          if "claim evidence" not in provenance:
              marker = "## Inputs and retrieval"
              sentence = (
                  "Treat every artifact cited as claim evidence as primary for bundle validation, "
                  "review invalidation, index navigation, and final presentation."
              )
              if marker not in provenance:
                  raise SystemExit("missing provenance insertion marker")
              provenance = provenance.replace(marker, sentence + "\n\n" + marker, 1)
              provenance_path.write_text(provenance, encoding="utf-8")
          PY
      - name: Audit deterministic skill inventory
        run: uv run python scripts/audit_skills.py
      - name: Generate catalog wrappers
        run: uv run python scripts/generate_wrappers.py
      - name: Restore permanent read-only CI definition
        run: |
          cp scripts/ci.permanent.yml .github/workflows/ci.yml
          rm -f scripts/ci.permanent.yml
          rm -f .github/workflows/regenerate-science-catalog.yml
          rm -f .ci/test-failure.log
          rmdir .ci 2>/dev/null || true
      - name: Compile Python sources
        run: ./scripts/check.sh compile
      - id: unit_tests
        name: Run unit tests
        continue-on-error: true
        run: |
          set +e
          uv run python -m unittest discover -s tests > /tmp/unit-tests.log 2>&1
          status=$?
          cat /tmp/unit-tests.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit "$status"
      - name: Persist failing test diagnostics
        if: steps.unit_tests.outcome == 'failure'
        run: |
          mkdir -p .ci
          cp /tmp/unit-tests.log .ci/test-failure.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Capture generated state and failing tests"
          git push origin HEAD:${GITHUB_HEAD_REF}
          exit 1
      - name: Verify inventory determinism
        run: ./scripts/check.sh inventory
      - name: Verify generated wrappers
        run: ./scripts/check.sh wrappers
      - name: Validate evidence, model, and SBDD contracts
        run: ./scripts/check.sh contracts
      - name: Validate plugin and skills when validators are available
        run: ./scripts/check.sh skills
      - id: commit
        name: Commit generated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "Regenerate catalog for scientific contracts"
          git push origin HEAD:${GITHUB_HEAD_REF}
          echo "changed=true" >> "$GITHUB_OUTPUT"

  check:
    needs: regenerate
    if: needs.regenerate.outputs.changed != 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: ${{ matrix.python-version }}
      - name: Compile Python sources
        run: ./scripts/check.sh compile
      - name: Run native skill quality tests
        run: uv run python tests/test_native_skill_quality.py
      - name: Run full unit test suite
        run: ./scripts/check.sh tests
      - name: Verify inventory determinism
        run: ./scripts/check.sh inventory
      - name: Verify generated wrappers
        run: ./scripts/check.sh wrappers
      - name: Validate evidence, model, and SBDD contracts
        run: ./scripts/check.sh contracts
      - name: Validate plugin and skills when validators are available
        run: ./scripts/check.sh skills
