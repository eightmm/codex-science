name: Validate native runtime v4 and record receipt

on:
  push:
    branches: [agent/reference-runtime-v3]
  pull_request:

permissions:
  contents: write

concurrency:
  group: validate-native-runtime-v4-receipt-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 140
    steps:
      - name: Let integration workflows finish first
        run: sleep 300
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          submodules: recursive
          fetch-depth: 0
      - name: Install uv and Python runtimes
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.11"
      - name: Ensure Python 3.12 is available
        run: uv python install 3.12
      - name: Remove any remaining one-time Python files
        run: |
          rm -f scripts/integrate_native_runtime_v4.py
          rm -f scripts/finalize_native_runtime_v4.py
          rm -f scripts/apply_complete_native_runtime_v4.py
          rm -f scripts/repair_native_runtime_v4.py
          rm -f scripts/seal_native_runtime_v4.py
          rm -f scripts/integrate_extended_runtime_v4.py
          rm -f scripts/patch_permanent_runtime_v4.py
          rm -f scripts/harden_extended_runtime_v4.py
          rm -f scripts/integrate_reviewer_runtime_v4.py
          rm -f scripts/integrate_review_action_runtime_v4.py
          rm -f scripts/harden_review_action_runtime_v4.py
          rm -f scripts/harden_core_runtime_v4.py
      - name: Regenerate and validate generated state
        run: |
          uv run --python 3.11 python scripts/audit_skills.py
          uv run --python 3.11 python scripts/generate_wrappers.py
          ./scripts/check.sh inventory
          ./scripts/check.sh wrappers
      - name: Run complete Python 3.11 validation
        run: ./scripts/check.sh fast
      - name: Run complete Python 3.12 unit suite
        run: uv run --python 3.12 python -m unittest discover -s tests
      - name: Write deterministic validation receipt
        run: |
          mkdir -p reports
          python - <<'PY'
          from __future__ import annotations
          import hashlib
          import json
          import subprocess
          from datetime import datetime, timezone
          from pathlib import Path

          def digest(path: Path) -> str:
              return hashlib.sha256(path.read_bytes()).hexdigest()

          root = Path('.')
          payload = {
              "schema_version": 1,
              "status": "passed",
              "validated_at": datetime.now(timezone.utc).replace(microsecond=0).isoformat().replace('+00:00', 'Z'),
              "source_head": subprocess.check_output(['git', 'rev-parse', 'HEAD'], text=True).strip(),
              "python": ["3.11", "3.12"],
              "checks": [
                  "compile",
                  "complete unit suite on Python 3.11",
                  "complete unit suite on Python 3.12",
                  "inventory determinism",
                  "wrapper determinism",
                  "release and connector contracts",
                  "artifact and sidecar contracts",
                  "native skill reference audit",
                  "native skill maturity audit",
                  "reviewer benchmark",
                  "model registry contracts",
                  "deterministic SBDD acceptance",
                  "plugin and skill validation when system validators are available"
              ],
              "inventory_sha256": digest(root / 'catalog' / 'inventory.json'),
              "model_registry_v2_sha256": digest(root / 'models' / 'registry-v2.json'),
              "plugin_manifest_sha256": digest(root / '.codex-plugin' / 'plugin.json'),
              "limitations": [
                  "CodeQL and hosted public-source drift are separate workflows.",
                  "External live services, remote clusters, and provider write adapters are not exercised by this local deterministic receipt.",
                  "A passed software contract does not establish scientific truth or empirical model performance."
              ]
          }
          material = json.dumps(payload, sort_keys=True, separators=(',', ':'), ensure_ascii=False).encode()
          payload['fingerprint'] = hashlib.sha256(material).hexdigest()
          (root / 'reports' / 'native-runtime-v4-validation.json').write_text(
              json.dumps(payload, indent=2, sort_keys=True, ensure_ascii=False) + '\n',
              encoding='utf-8'
          )
          PY
      - name: Remove every one-time workflow
        run: |
          rm -f .github/workflows/integrate-native-runtime-v4.yml
          rm -f .github/workflows/finalize-native-runtime-v4.yml
          rm -f .github/workflows/complete-native-runtime-v4.yml
          rm -f .github/workflows/apply-complete-native-runtime-v4.yml
          rm -f .github/workflows/seal-native-runtime-v4.yml
          rm -f .github/workflows/seal-extended-native-runtime-v4.yml
          rm -f .github/workflows/finish-native-runtime-v4.yml
          rm -f .github/workflows/commit-permanent-runtime-v4.yml
          rm -f .github/workflows/finalize-all-runtime-v4.yml
          rm -f .github/workflows/finalize-complete-runtime-v4.yml
          rm -f .github/workflows/ultimate-native-runtime-v4.yml
          rm -f .github/workflows/validate-native-runtime-v4-receipt.yml
      - name: Commit clean validated runtime and receipt
        run: |
          branch="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Validate progressive references and scientific runtime v4"
          git fetch origin "$branch"
          git rebase "origin/$branch"
          git push origin HEAD:"$branch"
