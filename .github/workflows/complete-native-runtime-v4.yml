name: Complete native runtime v4

on:
  push:
    branches: [agent/reference-runtime-v3]
  pull_request:

permissions:
  contents: write

concurrency:
  group: complete-native-runtime-v4-${{ github.ref }}
  cancel-in-progress: false

jobs:
  complete:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          submodules: recursive
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.11"
      - name: Integrate source and progressive references
        run: |
          if [ -f scripts/integrate_native_runtime_v4.py ]; then
            uv run python scripts/integrate_native_runtime_v4.py
          fi
          if [ -f scripts/finalize_native_runtime_v4.py ]; then
            uv run python scripts/finalize_native_runtime_v4.py
          fi
      - name: Make local submission receipt deterministic
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path("src/codex_science/compute_backends.py")
          text = path.read_text(encoding="utf-8")
          old = '''        current = _read_json(job_dir / "state.json")
                  # A short command may already have written running or terminal state.
                  # Add the PID only while the original submitted state is still current;
                  # never overwrite a newer worker receipt.
                  if current.get("state") == "submitted":
                      state = _state_material(
                          spec,
                          job_id=job_id,
                          state="submitted",
                          submitted_at=submitted_at,
                          worker_pid=process.pid,
                          message="local worker started",
                      )
                      _atomic_json(job_dir / "state.json", state)
                  else:
                      state = current
                  return state
          '''
          old = '\n'.join(line[10:] if line.startswith('          ') else line for line in old.splitlines()) + '\n'
          new = '''        current = _read_json(job_dir / "state.json")
                  # A short command may already have written running or terminal state.
                  # Persist the PID only while the original submitted state is current,
                  # but always return the historical submission receipt to the caller.
                  submitted_receipt = _state_material(
                      spec,
                      job_id=job_id,
                      state="submitted",
                      submitted_at=submitted_at,
                      worker_pid=process.pid,
                      message="local worker started",
                  )
                  if current.get("state") == "submitted":
                      _atomic_json(job_dir / "state.json", submitted_receipt)
                  return submitted_receipt
          '''
          new = '\n'.join(line[10:] if line.startswith('          ') else line for line in new.splitlines()) + '\n'
          if new not in text:
              if old not in text:
                  raise SystemExit("local submission receipt marker is missing")
              path.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY
      - name: Regenerate audited inventory and wrappers
        run: |
          uv run python scripts/audit_skills.py
          uv run python scripts/generate_wrappers.py
      - name: Compile runtime
        run: uv run python -m compileall -q src scripts
      - name: Run focused runtime tests
        run: |
          uv run python -m unittest discover -s tests -p 'test_artifact_runtime.py'
          uv run python -m unittest discover -s tests -p 'test_artifact_runtime_sidecars.py'
          uv run python -m unittest discover -s tests -p 'test_project_store.py'
          uv run python -m unittest discover -s tests -p 'test_compute_backends.py'
          uv run python -m unittest discover -s tests -p 'test_skill_maturity.py'
      - name: Run complete repository validation
        run: ./scripts/check.sh fast
      - name: Remove one-time resources
        run: |
          rm -f .github/workflows/integrate-native-runtime-v4.yml
          rm -f .github/workflows/finalize-native-runtime-v4.yml
          rm -f .github/workflows/complete-native-runtime-v4.yml
          rm -f scripts/integrate_native_runtime_v4.py
          rm -f scripts/finalize_native_runtime_v4.py
      - name: Commit completed implementation
        run: |
          branch="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No completion changes"
            exit 0
          fi
          git commit -m "Complete native artifact, project, compute, and skill maturity runtimes"
          git push origin HEAD:"$branch"
