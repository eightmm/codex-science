name: Finalize reference runtime integration

on:
  pull_request:

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref }}
          submodules: recursive
          fetch-depth: 0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.11"
      - name: Index the existing catalog policy reference
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          index_path = Path('skills/codex-science/references/index.json')
          payload = json.loads(index_path.read_text(encoding='utf-8'))
          if not any(item.get('id') == 'catalog-policy' for item in payload['references']):
              payload['references'].append(
                  {
                      'id': 'catalog-policy',
                      'path': 'references/catalog-policy.md',
                      'purpose': 'Interpret active/inactive catalog status, audit reasons, and the boundary between inspection acknowledgement and execution approval.',
                      'read_when': [
                          'selecting a catalog skill',
                          'inspecting an inactive skill',
                          'explaining an activation reason',
                      ],
                      'required_before': [
                          'inactive-skill-inspection',
                          'catalog-activation-decision',
                      ],
                      'search_patterns': [
                          '## Status meaning',
                          '## Inactive reasons',
                          'Explicit acknowledgement',
                      ],
                      'authority': 'repository-contract',
                      'version': '1',
                      'evidence_boundary': 'Controls catalog authorization; it does not authorize credentials, installs, writes, paid compute, or imported code execution.',
                  }
              )
          index_path.write_text(json.dumps(payload, indent=2, sort_keys=True) + '\n', encoding='utf-8')

          skill_path = Path('skills/codex-science/SKILL.md')
          text = skill_path.read_text(encoding='utf-8')
          catalog_sentence = 'Read [the catalog policy](references/catalog-policy.md) before selecting or inspecting an inactive catalog skill.'
          goal_sentence = 'Read [the Goal-loop contract](references/goal-loop-contract.md) before starting, resuming, or completing a native Goal run.'
          if catalog_sentence not in text:
              if goal_sentence not in text:
                  raise SystemExit('Goal-loop reference sentence marker is missing')
              text = text.replace(goal_sentence, catalog_sentence + ' ' + goal_sentence, 1)
          skill_path.write_text(text, encoding='utf-8')
          PY
      - name: Remove temporary diagnostics
        run: |
          rm -rf .ci
          rm -f .github/workflows/reference-runtime-diagnostics.yml
          rm -f .github/workflows/reference-audit-report.yml
          rm -f .github/workflows/fix-reference-runtime.yml
      - name: Regenerate deterministic catalog and wrappers
        run: |
          uv run python scripts/audit_skills.py
          uv run python scripts/generate_wrappers.py
      - name: Commit finalized source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Finalize progressive reference contracts"
          git push origin HEAD:${GITHUB_HEAD_REF}
      - name: Run complete verification
        run: ./scripts/check.sh fast
