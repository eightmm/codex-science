name: Public API drift

on:
  schedule:
    - cron: "17 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.11"
      - name: Restore previous drift state
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: drift/state.json
          key: public-api-drift-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            public-api-drift-${{ github.ref_name }}-
      - name: Run structured public-source drift probes
        id: drift
        continue-on-error: true
        run: |
          mkdir -p drift
          uv run python scripts/public_drift.py \
            --state-in drift/state.json \
            --state-out drift/state.json \
            --output-json drift/report.json \
            --output-md drift/report.md
      - name: Save next drift state
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: drift/state.json
          key: public-api-drift-${{ github.ref_name }}-${{ github.run_id }}
      - name: Upload drift report and next-state receipt
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: codex-science-public-drift-${{ github.run_id }}
          path: drift/
          if-no-files-found: error
          retention-days: 30
      - name: Fail on semantic drift, degradation, or unavailability
        if: steps.drift.outcome == 'failure'
        run: exit 1
