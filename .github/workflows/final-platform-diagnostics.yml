name: Final platform diagnostics

on:
  pull_request:

permissions:
  contents: read

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.11"
      - name: MCP compatibility
        continue-on-error: true
        run: uv run python -m unittest discover -s tests -p test_mcp_server.py
      - name: Update entry
        continue-on-error: true
        run: uv run python -m unittest discover -s tests -p test_update_entry.py
      - name: Public drift
        continue-on-error: true
        run: uv run python -m unittest discover -s tests -p test_public_drift.py
      - name: Release and connectors
        continue-on-error: true
        run: uv run python -m unittest discover -s tests -p test_release_connector_v2.py
      - name: Candidate contract
        continue-on-error: true
        run: uv run python scripts/candidate_contract_check.py
