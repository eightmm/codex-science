name: Failure index

on:
  pull_request:

permissions:
  contents: write

jobs:
  index:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref }}
          submodules: recursive
          fetch-depth: 0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.11"
      - name: Run every test module and collect failures
        run: |
          mkdir -p .ci
          : > .ci/failing-tests.txt
          for file in tests/test_*.py; do
            name="$(basename "$file")"
            if ! uv run python -m unittest discover -s tests -p "$name" > "/tmp/$name.log" 2>&1; then
              echo "$name" >> .ci/failing-tests.txt
              printf '\n===== %s =====\n' "$name" >> .ci/failing-tests.log
              cat "/tmp/$name.log" >> .ci/failing-tests.log
            fi
          done
      - name: Persist failure index
        run: |
          if [ ! -s .ci/failing-tests.txt ]; then
            echo "none" > .ci/failing-tests.txt
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .ci/failing-tests.txt .ci/failing-tests.log 2>/dev/null || git add .ci/failing-tests.txt
          git commit -m "Record failing test modules"
          git push origin HEAD:${GITHUB_HEAD_REF}
