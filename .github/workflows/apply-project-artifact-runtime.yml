name: Apply project and artifact runtime

on:
  push:
    branches: [agent/reference-runtime-v3]
  pull_request:

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          submodules: recursive
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.11"
      - name: Verify and expand runtime payload
        run: |
          set -euo pipefail
          archive=.github/project-artifact-runtime/payload.tgz
          test -f "$archive"
          file "$archive"
          gzip -t "$archive"
          echo "archive sha256=$(sha256sum "$archive" | cut -d' ' -f1)"
          python - <<'PY'
          import pathlib
          import tarfile

          archive = pathlib.Path('.github/project-artifact-runtime/payload.tgz')
          destination = pathlib.Path('.').resolve()
          with tarfile.open(archive, mode='r:gz') as handle:
              members = handle.getmembers()
              if not members:
                  raise SystemExit('runtime archive is empty')
              for member in members:
                  name = member.name.removeprefix('./')
                  if not name:
                      continue
                  target = (destination / name).resolve()
                  if not target.is_relative_to(destination):
                      raise SystemExit(f'archive member escapes repository: {member.name}')
                  if member.issym() or member.islnk():
                      raise SystemExit(f'archive links are forbidden: {member.name}')
              print(f'validated {len(members)} archive members')
          PY
          tar --extract --gzip --file "$archive" --directory . --no-same-owner --no-same-permissions
      - name: Extend progressive reference maps
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          def add_reference(path: str, entry: dict) -> None:
              target = Path(path)
              payload = json.loads(target.read_text(encoding='utf-8'))
              if not any(item.get('id') == entry['id'] for item in payload['references']):
                  payload['references'].append(entry)
              target.write_text(json.dumps(payload, indent=2, sort_keys=True) + '\n', encoding='utf-8')

          add_reference(
              'skills/science-provenance/references/index.json',
              {
                  'id': 'artifact-runtime',
                  'path': 'references/artifact-runtime.md',
                  'purpose': 'Create typed offline artifact views, hash-bound selections, and non-executing transform proposals.',
                  'read_when': [
                      'rendering a scientific artifact',
                      'creating a typed artifact selection',
                      'proposing an artifact edit',
                      'planning a selective rerun from an annotation',
                  ],
                  'required_before': [
                      'artifact-runtime-render',
                      'artifact-selection',
                      'transform-proposal',
                  ],
                  'search_patterns': [
                      '## Viewer routing',
                      '## Typed selections',
                      '## Transform proposal',
                      '## Rerun handoff',
                  ],
                  'authority': 'repository-contract',
                  'version': '1',
                  'evidence_boundary': 'Derived views, selections, and proposals are not evidence that a transform executed or a scientific claim is valid.',
              },
          )
          add_reference(
              'skills/codex-science/references/index.json',
              {
                  'id': 'project-evidence-store',
                  'path': 'references/project-evidence-store.md',
                  'purpose': 'Manage project-level run lineage, hypothesis forks, quantitative assertions, comparisons, and merge plans.',
                  'read_when': [
                      'initializing a science project',
                      'importing multiple reviewed runs',
                      'forking a hypothesis or method branch',
                      'adding a quantitative evidence assertion',
                      'preparing a scientific merge plan',
                  ],
                  'required_before': [
                      'project-run-import',
                      'hypothesis-fork',
                      'evidence-assertion',
                      'project-merge-plan',
                  ],
                  'search_patterns': [
                      '## Project layout',
                      '## Fork a hypothesis',
                      '## Evidence assertion',
                      '## Compare and merge-plan',
                  ],
                  'authority': 'repository-contract',
                  'version': '1',
                  'evidence_boundary': 'The project store indexes validated runs; it does not replace manifests, execute experiments, or prove claims.',
              },
          )

          provenance = Path('skills/science-provenance/SKILL.md')
          text = provenance.read_text(encoding='utf-8')
          marker = 'Read [the artifact contract](references/artifact-contract.md) before authoring a manifest, sidecar, or bundle-version change. Read [the large-artifact protocol](references/large-artifacts.md) before registering a directory, a file too large for whole-memory loading, a chunked dataset, model weights, or an immutable external object. Do not guess sidecar fields, Merkle rules, or invalidation semantics.'
          replacement = marker + ' Read [the artifact runtime contract](references/artifact-runtime.md) before rendering a native artifact view, saving a typed selection, proposing an edit, or issuing a selective-rerun handoff.'
          if 'references/artifact-runtime.md' not in text:
              if marker not in text:
                  raise SystemExit('science-provenance reference marker is missing')
              text = text.replace(marker, replacement, 1)
          provenance.write_text(text, encoding='utf-8')

          coordinator = Path('skills/codex-science/SKILL.md')
          text = coordinator.read_text(encoding='utf-8')
          marker = 'Read [the catalog policy](references/catalog-policy.md) before selecting or inspecting an inactive catalog skill. Read [the Goal-loop contract](references/goal-loop-contract.md) before starting, resuming, or completing a native Goal run.'
          replacement = 'Read [the catalog policy](references/catalog-policy.md) before selecting or inspecting an inactive catalog skill. Read [the project evidence-store contract](references/project-evidence-store.md) before importing multiple runs, forking a hypothesis, adding a quantitative assertion, or preparing a merge plan. Read [the Goal-loop contract](references/goal-loop-contract.md) before starting, resuming, or completing a native Goal run.'
          if 'references/project-evidence-store.md' not in text:
              if marker not in text:
                  raise SystemExit('codex-science reference marker is missing')
              text = text.replace(marker, replacement, 1)
          coordinator.write_text(text, encoding='utf-8')

          platform = Path('docs/PLATFORM_CONTRACTS.md')
          text = platform.read_text(encoding='utf-8')
          heading = '## Native artifact runtime and project evidence store'
          if heading not in text:
              text += '''\n\n## Native artifact runtime and project evidence store\n\nUse `scripts/render_artifact_runtime.py` to build a validated, offline runtime descriptor and HTML view for structures, molecules, genome records, AnnData containers, tables, figures, evidence graphs, trajectories, directories, and text. A viewer remains bounded: it reads a preview or metadata rather than loading a large scientific object wholesale.\n\nSelections are typed, artifact-hash-bound records. A transform proposal records the requested operation, structured parameters, affected steps, expected outputs, approval boundary, and deterministic fingerprint. A proposal does not mutate source bytes or claim that execution occurred. Save material selections and proposals as `artifact-selection` and `transform-proposal` sidecars.\n\nUse `scripts/science_project.py` to initialize a local SQLite project evidence store, import hash-validated runs, fork hypotheses, add quantitative evidence assertions with exact locators and independence groups, compare runs, and prepare non-executing merge plans. The project store is an index over immutable run bundles; manifests and artifact hashes remain authoritative.\n'''
              platform.write_text(text, encoding='utf-8')

          status = Path('docs/IMPLEMENTATION_STATUS.md')
          text = status.read_text(encoding='utf-8')
          heading = '### Native artifact runtime and project memory'
          if heading not in text:
              insertion = '''\n### Native artifact runtime and project memory\n\n- Typed, bounded previews for structures, molecules, genome records, tables, figures, evidence graphs, trajectories, directories, and text.\n- Hash-bound selections and deterministic transform proposals that feed selective rerun planning without silently mutating artifacts.\n- Local SQLite project evidence store with run lineage, branches, quantitative assertions, comparisons, and merge plans.\n'''
              marker = '\n## Deliberate boundaries\n'
              if marker in text:
                  text = text.replace(marker, insertion + marker, 1)
              else:
                  text += insertion
              status.write_text(text, encoding='utf-8')
          PY
      - name: Regenerate deterministic catalog and wrappers
        run: |
          uv run python scripts/audit_skills.py
          uv run python scripts/generate_wrappers.py
      - name: Remove one-time integration resources
        run: |
          rm -rf .github/project-artifact-runtime
          rm -rf .github/runtime-source-payload
          rm -f .github/workflows/apply-project-artifact-runtime.yml
      - name: Commit integrated runtime source
        run: |
          branch="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add native artifact runtime and project evidence store"
          git push origin HEAD:"$branch"
      - name: Run complete verification
        run: ./scripts/check.sh fast
