name: Finalize complete scientific runtime v4

on:
  push:
    branches: [agent/reference-runtime-v3]
  pull_request:

permissions:
  contents: write

concurrency:
  group: finalize-complete-runtime-v4-${{ github.ref }}
  cancel-in-progress: false

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 100
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          submodules: recursive
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.11"
      - name: Apply permanent source and progressive reference patches
        run: |
          uv run python scripts/patch_permanent_runtime_v4.py
          uv run python scripts/harden_extended_runtime_v4.py
          uv run python scripts/integrate_review_action_runtime_v4.py
          uv run python scripts/harden_review_action_runtime_v4.py
      - name: Remove one-time Python files before compilation
        run: |
          rm -f scripts/integrate_native_runtime_v4.py
          rm -f scripts/finalize_native_runtime_v4.py
          rm -f scripts/apply_complete_native_runtime_v4.py
          rm -f scripts/repair_native_runtime_v4.py
          rm -f scripts/seal_native_runtime_v4.py
          rm -f scripts/integrate_extended_runtime_v4.py
          rm -f scripts/patch_permanent_runtime_v4.py
          rm -f scripts/harden_extended_runtime_v4.py
          rm -f scripts/integrate_reviewer_runtime_v4.py
          rm -f scripts/integrate_review_action_runtime_v4.py
          rm -f scripts/harden_review_action_runtime_v4.py
      - name: Regenerate audited inventory and wrappers
        run: |
          uv run python scripts/audit_skills.py
          uv run python scripts/generate_wrappers.py
      - name: Compile permanent source
        run: uv run python -m compileall -q src scripts
      - name: Run complete focused runtime suite
        run: |
          uv run python -m unittest discover -s tests -p 'test_artifact_runtime.py'
          uv run python -m unittest discover -s tests -p 'test_artifact_runtime_sidecars.py'
          uv run python -m unittest discover -s tests -p 'test_project_store.py'
          uv run python -m unittest discover -s tests -p 'test_compute_backends.py'
          uv run python -m unittest discover -s tests -p 'test_skill_maturity.py'
          uv run python -m unittest discover -s tests -p 'test_pipeline_compiler.py'
          uv run python -m unittest discover -s tests -p 'test_pipeline_compiler_security.py'
          uv run python -m unittest discover -s tests -p 'test_experiment_planner.py'
          uv run python -m unittest discover -s tests -p 'test_fair_export.py'
          uv run python -m unittest discover -s tests -p 'test_reviewer_runtime.py'
          uv run python -m unittest discover -s tests -p 'test_action_connectors.py'
          uv run python -m unittest discover -s tests -p 'test_review_action_receipts.py'
      - name: Run complete repository validation
        run: ./scripts/check.sh fast
      - name: Remove all one-time integration workflows
        run: |
          rm -f .github/workflows/integrate-native-runtime-v4.yml
          rm -f .github/workflows/finalize-native-runtime-v4.yml
          rm -f .github/workflows/complete-native-runtime-v4.yml
          rm -f .github/workflows/apply-complete-native-runtime-v4.yml
          rm -f .github/workflows/seal-native-runtime-v4.yml
          rm -f .github/workflows/seal-extended-native-runtime-v4.yml
          rm -f .github/workflows/finish-native-runtime-v4.yml
          rm -f .github/workflows/commit-permanent-runtime-v4.yml
          rm -f .github/workflows/finalize-all-runtime-v4.yml
          rm -f .github/workflows/finalize-complete-runtime-v4.yml
      - name: Commit clean permanent implementation
        run: |
          branch="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Finalize progressive references and complete scientific runtime v4"
          git fetch origin "$branch"
          git rebase "origin/$branch"
          git push origin HEAD:"$branch"
