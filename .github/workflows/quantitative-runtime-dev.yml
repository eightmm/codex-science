name: Quantitative runtime development

on:
  push:
    branches: [agent/quantitative-research-runtime]

permissions:
  contents: read

jobs:
  focused:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv run python -m compileall -q src scripts
      - run: uv run python -m unittest tests.test_math_research_runtime tests.test_research_design_statistics tests.test_numerical_units_uncertainty tests.test_quantitative_acceptance
