name: Regenerate science catalog

on:
  push:
    branches: [agent/strengthen-native-science-skills]

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.11"
      - name: Refresh README counts
        run: |
          python - <<'PY'
          from pathlib import Path

          replacements = {
              "README.md": {
                  "279 agent skills": "280 agent skills",
                  "279 catalog wrappers": "280 catalog wrappers",
                  "Codex-native authored — 127": "Codex-native authored — 128",
                  "25 agentic life-science source and synthesis workflows, six spectroscopy": "25 agentic life-science source and synthesis workflows, a protocol-driven literature-review conductor, six spectroscopy",
              },
              "README.ko.md": {
                  "279개 감사된 에이전트 스킬": "280개 감사된 에이전트 스킬",
                  "279개 카탈로그 wrapper": "280개 카탈로그 wrapper",
                  "Codex-native 저작 — 127": "Codex-native 저작 — 128",
                  "에이전틱 생명과학 source·synthesis workflow 25개, 분광": "에이전틱 생명과학 source·synthesis workflow 25개, protocol 기반 literature-review conductor, 분광",
              },
          }
          for filename, mapping in replacements.items():
              path = Path(filename)
              text = path.read_text(encoding="utf-8")
              for old, new in mapping.items():
                  if old not in text:
                      raise SystemExit(f"missing README marker: {filename}: {old}")
                  text = text.replace(old, new)
              path.write_text(text, encoding="utf-8")
          PY
      - name: Regenerate deterministic catalog and wrappers
        run: |
          uv run python scripts/audit_skills.py
          uv run python scripts/generate_wrappers.py
      - name: Run full fast validation
        run: ./scripts/check.sh fast
      - name: Commit generated state
        run: |
          rm -f .github/workflows/regenerate-science-catalog.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No generated changes"
            exit 0
          fi
          git commit -m "Regenerate catalog for scientific contracts"
          git push origin HEAD:${GITHUB_REF_NAME}
